spring:
  application:
    name: E-commerce Store API Test

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    show-sql: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    com.ecommerce.store: INFO
    org.testcontainers: INFO
